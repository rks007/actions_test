name: "CICD NodeJS Application"

on:
  push:
    branches: ["master"]

    paths-ignore:
      - "README.md"
    
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
       
      - name: Build docker image
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/cicd-app:${{ github.sha }} .  
        
      - name: Push docker image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/cicd-app:${{ github.sha }}  

