name: "CICD NodeJS Application"

on:
  push:
    branches: ["main"]

    paths-ignore:
      - "README.md"
    
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


  deploy-on_ec2:
    runs-on: ubuntu-latest